<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
    <meta charset="UTF-8">
    <title layout:title-pattern="$CONTENT_TITLE - QLSP">Bài 5_QLSP</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmdr5pnlYt2bRjXh0JmhJ6hW+ALEwIH"
          crossorigin="anonymous">
</head>
<body>
    <nav class="navbar bg-dark border-bottom border-body" data-bs-theme="dark">
        <div class="container-fluid" style="padding-left: 40px">
            <div class="d-flex gap-3">
                <a class="navbar-brand" th:href="@{/home}">Home</a>
                <a class="navbar-brand" th:href="@{/books}">Books</a>
                <a class="navbar-brand" th:href="@{/cart}">Giỏ hàng</a>
            </div>
            <form th:action="@{/logout}" method="post" class="me-3">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button type="submit" class="btn btn-outline-light btn-sm">Logout</button>
            </form>
        </div>
    </nav>
    <div class="container body-content mt-4">
        <div layout:fragment="content">
        </div>
    </div>

    <footer class="card-footer text-center mt-5">
        <hr/>
        <p>© 2077 – Phát triển ứng dụng với não bộ</p>
    </footer>
</body>
</html>
