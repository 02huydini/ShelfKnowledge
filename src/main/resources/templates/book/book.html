<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      layout:decorate="~{book/_layout}">
<head>
  <meta charset="UTF-8">
  <title>Book List</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div layout:fragment="content">
  <div class="container body-content">
    <a th:href="@{/books/create}" sec:authorize="hasRole('ADMIN')" class="btn btn-primary mb-3">Create New Book</a>
    <form th:action="@{/books}" method="get" class="d-flex gap-2 mb-3">
      <input type="text"
             name="keyword"
             class="form-control"
             placeholder="Nhập tên sách"
             th:value="${keyword}">
      <select name="categoryId" class="form-select" style="width: 200px">
        <option value="" th:selected="${categoryId == null}">Tất cả danh mục</option>
        <option th:each="cat : ${categories}"
                th:value="${cat.id}"
                th:text="${cat.name}"
                th:selected="${categoryId != null and cat.id == categoryId}">
        </option>
      </select>
      <select name="sort" class="form-select" style="width: 180px">
        <option value="asc" th:selected="${sort == 'asc'}">Giá tăng dần</option>
        <option value="desc" th:selected="${sort == 'desc'}">Giá giảm dần</option>
      </select>
      <button type="submit" class="btn btn-outline-success">Search</button>
    </form>
    <table class="table table-striped">
      <thead>
        <tr>
          <th>Id</th><th>Name</th><th>Image</th><th>Price</th><th>Category</th><th>Actions</th>
        </tr>
      </thead>
      <tbody>
        <tr th:if="${booksPage.totalElements == 0}">
          <td colspan="6" class="text-center text-muted">Không tìm thấy sách phù hợp.</td>
        </tr>
        <tr th:each="book : ${booksPage.content}">
          <th th:text="${book.id}"></th>
          <td th:text="${book.name}"></td>
          <td>
            <img th:if="${book.image != null}" th:src="@{/images/{img}(img=${book.image})}" alt="Book Image" class="img-thumbnail" style="height:120px;width:150px;">
          </td>
          <td th:text="${book.price}"></td>
          <td th:text="${book.category == null ? '' : book.category.name}"></td>
          <td>
            <form th:action="@{/cart/add}" method="post" class="d-flex gap-2 align-items-center mb-2">
              <input type="hidden" name="bookId" th:value="${book.id}"/>
              <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
              <input type="number" name="quantity" min="1" value="1" step="1" class="form-control form-control-sm" style="width: 90px"/>
              <button type="submit" class="btn btn-success btn-sm">Add</button>
            </form>

            <div sec:authorize="hasRole('ADMIN')">
              <a th:href="@{/books/edit/{id}(id=${book.id})}" class="btn btn-secondary btn-sm me-2">Edit</a>
              <form th:action="@{/books/delete/{id}(id=${book.id})}" method="post" style="display:inline;">
                <button type="submit" class="btn btn-danger btn-sm">Delete</button>
              </form>
            </div>
          </td>
        </tr>
      </tbody>
    </table>

    <div class="d-flex justify-content-between align-items-center">
      <div class="text-muted">
        Trang <span th:text="${booksPage.number + 1}"></span> / <span th:text="${booksPage.totalPages}"></span>
      </div>
      <div class="d-flex gap-2">
        <a class="btn btn-outline-primary"
           th:if="${booksPage.hasPrevious()}"
           th:href="@{/books(keyword=${keyword}, sort=${sort}, categoryId=${categoryId}, page=${booksPage.number - 1})}">
          Previous
        </a>
        <span class="btn btn-outline-primary disabled" th:if="${!booksPage.hasPrevious()}">Previous</span>

        <a class="btn btn-outline-primary"
           th:if="${booksPage.hasNext()}"
           th:href="@{/books(keyword=${keyword}, sort=${sort}, categoryId=${categoryId}, page=${booksPage.number + 1})}">
          Next
        </a>
        <span class="btn btn-outline-primary disabled" th:if="${!booksPage.hasNext()}">Next</span>
      </div>
    </div>
  </div>
</div>
</body>
</html>
